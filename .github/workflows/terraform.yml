name: Terraform CI

on:
push:
branches:
- main
- dev

pull_request:
branches:
- main
- dev

jobs:
terraform:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: environments/dev

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Terraform Init
    run: terraform init

  - name: Terraform Validate
    run: terraform validate

  - name: Terraform Plan
    run: terraform plan
```
